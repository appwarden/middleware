tensions:
  - name: "Fast setup vs production-safe configuration"
    skills:
      [
        "get-started-with-appwarden-middleware",
        "verify-setup-before-production-and-debug",
      ]
    description: "Quickstart examples omit CSP hardening, cache tuning, and lock page details that are required for production safety."
    implication: "Agents may stop at minimal wiring examples and skip critical production checks unless explicitly guided."
  - name: "Debug visibility vs log noise"
    skills:
      [
        "get-started-with-appwarden-middleware",
        "verify-setup-before-production-and-debug",
      ]
    description: "Debug mode is essential for first setup but should be disabled in production to reduce noise and avoid leaking internal details."
    implication: "Agents may leave debug: true in production or disable it before validating the heartbeat, both of which cause operational problems."
  - name: "Adapter convenience vs platform capability gaps"
    skills:
      [
        "wire-appwarden-into-cloudflare-adapters",
        "configure-nonce-csp-on-cloudflare",
      ]
    description: "Cloudflare framework adapters offer free in-app middleware, but the Next.js/OpenNext adapter cannot inject nonces, while the universal Cloudflare worker can."
    implication: "Agents may copy nonce-based CSP config from one Cloudflare adapter to another, silently breaking CSP on Next.js/OpenNext."
  - name: "Onboarding and installation ordering"
    skills:
      [
        "onboard-your-appwarden-organization",
        "get-started-with-appwarden-middleware",
      ]
    description: "Middleware can be installed before or after onboarding, but onboarding must be completed before the installation can be finished because a valid API token is required."
    implication: "Agents may try to fully verify and deploy middleware before completing onboarding, leaving the setup blocked at the API-token step."

