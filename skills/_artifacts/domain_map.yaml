  - name: "Configure nonce-based CSP on Cloudflare"
    slug: "configure-nonce-csp-on-cloudflare"
    domain: "security-configuration"
    description: "Set up nonce-based Content Security Policy headers for Cloudflare sites using Appwarden, configured in the domain configuration file and deployed via the workflow."
    type: "core"
    covers:
      [
        "nonce CSP configuration schema",
        "CSP headers in Cloudflare responses",
        "HTML rewriting and nonce injection",
        "domain configuration file csp-mode and csp-directives",
        "debugging CSP violations",
      ]
    tasks:
      [
        "Edit the domain configuration file (.appwarden/domains/your-app.yml) to add csp-mode and csp-directives",
        "Open a pull request and merge the domain configuration change",
        "Redeploy the Appwarden middleware via the deploy-appwarden-middleware workflow",
        "Verify CSP headers and nonce attributes with browser DevTools",
        "Use report-only mode first, then switch to enforced",
      ]
    failure_modes:
      - mistake: "Using {{nonce}} on a platform that does not support HTML rewriting"
        mechanism: "Nonce placeholders are only rewritten on Cloudflare Workers and Cloudflare framework adapters with HTML rewriting; Vercel and Next.js on Cloudflare (OpenNext) silently leave the placeholder in the header."
        wrong_pattern: |
          contentSecurityPolicy: {
            mode: "enforced",
            directives: { "script-src": ["'self'", "{{nonce}}"] },
          }
        correct_pattern: |
          // Use headers-only CSP on Vercel / OpenNext
          contentSecurityPolicy: {
            mode: "enforced",
            directives: { "default-src": ["'self'"] },
          }
        source: "README Feature Compatibility and src/schemas/vercel.ts VercelCSPSchema"
        priority: "CRITICAL"
        status: "active"
        skills:
          [
            "configure-nonce-csp-on-cloudflare",
            "wire-appwarden-into-vercel-edge-middleware",
            "wire-appwarden-into-cloudflare-adapters",
          ]
      - mistake: "Trying to configure nonce-based CSP on Vercel"
        mechanism: "Nonce-based CSP is Cloudflare-only because Vercel cannot rewrite HTML to inject nonces; Appwarden CSP on Vercel is headers-only."
        wrong_pattern: |
          // middleware.ts on Vercel
          contentSecurityPolicy: {
            mode: "enforced",
            directives: { "script-src": ["'self'", "{{nonce}}"] },
          }
        correct_pattern: |
          // Use a headers-only CSP on Vercel, or move to Cloudflare for nonce support
          contentSecurityPolicy: {
            mode: "enforced",
            directives: { "default-src": ["'self'"] },
          }
        source: "managing-content-security-policy.mdx Warning and README Feature Compatibility"
        priority: "CRITICAL"
        status: "active"
        skills:
          [
            "configure-nonce-csp-on-cloudflare",
            "wire-appwarden-into-vercel-edge-middleware",
          ]
      - mistake: "Starting CSP in enforced mode before validating directives"
        mechanism: "Enforced mode blocks violations immediately; report-only lets developers collect violations and fix them before enforcement."
        wrong_pattern: |
          contentSecurityPolicy: { mode: "enforced", directives: { ... } }
        correct_pattern: |
          contentSecurityPolicy: { mode: "report-only", directives: { ... } }
          // Switch to enforced after no violations are reported
        source: "README Configuration > contentSecurityPolicy and managing-content-security-policy.mdx Enablement"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Passing CSP_DIRECTIVES as a malformed JSON string"
        mechanism: "The schema parses string directives with JSON.parse; malformed JSON causes a validation error surfaced in the heartbeat response."
        wrong_pattern: |
          CSP_DIRECTIVES: "{ 'script-src': ['self'] }"
        correct_pattern: |
          CSP_DIRECTIVES: '{"script-src": ["\'self\'"]}'
        source: "src/schemas/use-content-security-policy.ts CSPDirectivesSchema"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Editing CSP only in middleware code without updating the domain configuration"
        mechanism: "For the universal Cloudflare middleware, CSP is sourced from the domain configuration file; code-level overrides only apply to framework adapters."
        wrong_pattern: |
          // Only editing CSP in the worker code, ignoring .appwarden/domains/your-app.yml
        correct_pattern: |
          // Update .appwarden/domains/your-app.yml, merge, and redeploy via deploy-appwarden-middleware.yml
        source: "managing-content-security-policy.mdx Enablement and cloudflare-middleware-integration.mdx Configuration management"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Not redeploying the universal middleware after merging CSP changes"
        mechanism: "Changes to the domain configuration file only take effect after the deploy-appwarden-middleware workflow runs and deploys the updated Worker."
        wrong_pattern: |
          // Merge the PR and expect CSP to apply immediately without redeploying
        correct_pattern: |
          // Merge the PR, then trigger deploy-appwarden-middleware.yml (or push/release depending on triggers)
        source: "managing-content-security-policy.mdx Deployment"
        priority: "MEDIUM"
        status: "active"
  - name: "Create and configure Appwarden lock page"
    slug: "create-and-configure-lock-page"
    domain: "security-configuration"
    description: "Build a neutral maintenance-style lock page and connect it to Appwarden lockPageSlug."
    type: "core"
    covers:
      [
        "lock page route and template",
        "neutral messaging and UX",
        "linking back to main homepage",
        "lockPageSlug validation and defaults",
      ]
    tasks:
      [
        "Scaffold a lock page route in the target framework",
        "Use neutral “maintenance” messaging plus homepage link",
        "Configure lockPageSlug to point at the new route",
      ]
    failure_modes:
      - mistake: "Configuring a lockPageSlug that does not exist as a route"
        mechanism: "If the lock page route is missing, quarantined visitors receive 404s instead of the maintenance page."
        wrong_pattern: |
          lockPageSlug: "/lockdown" // no /lockdown route in the app
        correct_pattern: |
          lockPageSlug: "/maintenance" // with a real /maintenance page
        source: "README Configuration > lockPageSlug"
        priority: "HIGH"
        status: "active"
      - mistake: "Using incident-specific or alarming messaging on the lock page"
        mechanism: "Appwarden guidance is to use neutral “doing maintenance, back online soon” language and link to the homepage."
        wrong_pattern: |
          <h1>Site compromised — emergency lockdown</h1>
        correct_pattern: |
          <h1>We’re doing maintenance</h1>
          <p>We’ll be back online soon. <a href="/">Return home</a></p>
        source: "intent-log.md Turn 17"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Providing an absolute URL or protocol-relative lockPageSlug"
        mechanism: "The schema rejects slugs containing ://, starting with //, or containing backslashes; lockPageSlug must be a relative path."
        wrong_pattern: |
          lockPageSlug: "https://example.com/maintenance"
        correct_pattern: |
          lockPageSlug: "/maintenance"
        source: "src/schemas/helpers.ts ValidLockPageSlugSchema"
        priority: "MEDIUM"
        status: "active"
