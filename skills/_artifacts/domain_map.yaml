  - name: "Wire Appwarden into Cloudflare adapters"
    slug: "wire-appwarden-into-cloudflare-adapters"
    domain: "middleware-integration"
    description: "Add Appwarden middleware to Astro, Next.js, React Router, and TanStack Start Cloudflare adapter projects using appwarden-link and getAppwardenConfiguration."
    type: "framework"
    covers:
      [
        "Cloudflare adapter middleware entrypoints",
        "appwarden-link prebuild step and .appwarden/linked/middleware.json",
        "Appwarden heartbeat and lock page wiring",
        "Adapter-specific routing constraints",
        "getAppwardenConfiguration merge with generated config",
      ]
    tasks:
      [
        "Add appwarden-link --fqdn=your.app as a prebuild script",
        "Import .appwarden/linked/middleware.json and merge with getAppwardenConfiguration",
        "Create or update adapter middleware files in the framework-specific location",
        "Pass Appwarden config into adapter-specific helpers",
        "Verify requests are quarantined correctly per adapter",
        "Run /quarantine test and check /_appwarden/test",
      ]
    subsystems:
      - name: "Astro Cloudflare adapter"
        package: "@appwarden/middleware/cloudflare/astro"
        config_surface: "astro:middleware sequence, env from cloudflare:workers, imported .appwarden/linked/middleware.json"
      - name: "React Router Cloudflare adapter"
        package: "@appwarden/middleware/cloudflare/react-router"
        config_surface: "future.v8_middleware: true in react-router.config.ts, middleware array in app/root.tsx"
      - name: "TanStack Start Cloudflare adapter"
        package: "@appwarden/middleware/cloudflare/tanstack-start"
        config_surface: "createMiddleware().server(...) wrapped in createStart requestMiddleware"
      - name: "Next.js Cloudflare (OpenNext) adapter"
        package: "@appwarden/middleware/cloudflare/nextjs"
        config_surface: "middleware.ts (Next.js 15 and earlier) or proxy.ts (Next.js 16+) with matcher config, CSP headers only, no nonce support"
    failure_modes:
      - mistake: "Forgetting the appwarden-link prebuild step for framework adapters"
        mechanism: "Framework adapters sync lock page and CSP settings from the Appwarden dashboard at build time; without appwarden-link, .appwarden/linked/middleware.json is missing or stale."
        wrong_pattern: |
          // No prebuild script
        correct_pattern: |
          // package.json
          "prebuild": "appwarden-link --fqdn=your.app"
        source: "cloudflare-middleware-integration.mdx Shared setup for framework adapters"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Lifecycle scripts disabled in npm or pnpm"
        mechanism: "When ignore-scripts is set to true in npm or pnpm, the prebuild script does not run automatically and appwarden-link is skipped, leaving .appwarden/linked/middleware.json missing."
        wrong_pattern: |
          // .npmrc
          ignore-scripts=true
        correct_pattern: |
          // .npmrc
          ignore-scripts=false
          // or explicitly invoke appwarden-link before the framework build
          appwarden-link --fqdn=your.app && astro build
        source: "npm/pnpm ignore-scripts behavior and cloudflare-middleware-integration.mdx prebuild guidance"
        priority: "HIGH"
        status: "active"
      - mistake: "Committing .appwarden/linked/ to source control"
        mechanism: "The generated middleware.json is produced at build time and should not be committed; it should be added to .gitignore."
        wrong_pattern: |
          // .appwarden/linked/middleware.json tracked in git
        correct_pattern: |
          // .gitignore
          .appwarden/linked/
        source: "cloudflare-middleware-integration.mdx Shared setup for framework adapters"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Using nonce-based CSP on the Next.js Cloudflare adapter"
        mechanism: "The OpenNext adapter applies CSP headers only before origin; it does not rewrite HTML or inject nonces, so {{nonce}} placeholders will not work."
        wrong_pattern: |
          contentSecurityPolicy: {
            mode: "enforced",
            directives: {
              "script-src": ["'self'", "{{nonce}}"],
            },
          }
        correct_pattern: |
          contentSecurityPolicy: {
            mode: "enforced",
            directives: {
              "script-src": ["'self'"],
            },
          }
        source: "README Feature Compatibility and src/schemas/nextjs-cloudflare.ts NextJsCloudflareCSPInputSchema"
        priority: "HIGH"
        status: "active"
      - mistake: "Placing Next.js middleware.ts at the project root when the app uses src/ layout"
        mechanism: "Next.js only loads middleware.ts from the project root or from src/ depending on the app layout; a misplaced file means middleware-manifest.json is empty and Appwarden never runs."
        wrong_pattern: |
          // websites/appwarden-io/landing/middleware.ts
          // app uses src/app layout
        correct_pattern: |
          // websites/appwarden-io/landing/src/middleware.ts
        source: "cloudflare-middleware-integration.mdx Next.js on Cloudflare Workers"
        priority: "HIGH"
        status: "active"
      - mistake: "Using middleware.ts instead of proxy.ts for Next.js 16+"
        mechanism: "Next.js 16 renamed middleware to proxy; a middleware.ts file is silently ignored in Next.js 16+ projects."
        wrong_pattern: |
          // middleware.ts in a Next.js 16+ project
        correct_pattern: |
          // proxy.ts in a Next.js 16+ project
        source: "cloudflare-middleware-integration.mdx Next.js on Cloudflare Workers > Create Next.js middleware"
        priority: "HIGH"
        status: "active"
      - mistake: "Forgetting the v8_middleware flag in React Router config"
        mechanism: "React Router ignores middleware exports unless future.v8_middleware: true is set in react-router.config.ts; without it, Appwarden never runs."
        wrong_pattern: |
          // react-router.config.ts without the flag
          export default { ssr: true }
        correct_pattern: |
          // react-router.config.ts
          export default { ssr: true, future: { v8_middleware: true } }
        source: "cloudflare-middleware-integration.mdx React Router on Cloudflare Workers > Enable middleware in React Router config"
        priority: "HIGH"
        status: "active"
      - mistake: "Serving the lock page without the configured CSP headers"
        mechanism: "Both the Vercel runner and the Next.js Cloudflare adapter short-circuit with NextResponse.next() when the request is already on the lock page, bypassing CSP header injection."
        wrong_pattern: |
          // relying on the lock page inheriting CSP from the middleware
        correct_pattern: |
          // Apply CSP at the framework/page level as well, or accept that the lock page may not receive middleware CSP headers
        source: "examples/bug-reports-nextjs-cloudflare.md and examples/bug-reports-vercel.md"
        priority: "MEDIUM"
        status: "active"
  - name: "Standalone Cloudflare middleware with GitHub workflow"
    slug: "standalone-cloudflare-middleware-github-workflow"
    domain: "middleware-integration"
    description: "Use Appwarden as standalone Cloudflare middleware and deploy it via the deploy-appwarden-middleware GitHub Actions workflow."
    type: "framework"
    covers:
      [
        "standalone Cloudflare worker entrypoint",
        "Appwarden middleware runner configuration",
        "deploy-appwarden-middleware.yml GitHub Actions workflow",
        "required secrets (CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN, APPWARDEN_API_TOKEN)",
        "Wrangler secret and environment alignment",
      ]
    tasks:
      [
        "Create a standalone Cloudflare middleware worker entrypoint",
        "Configure Appwarden middleware runner and env vars",
        "Add .github/workflows/deploy-appwarden.yml from the template",
        "Set CLOUDFLARE_ACCOUNT_ID as a repository variable and APPWARDEN_API_TOKEN/CLOUDFLARE_API_TOKEN as secrets",
        "Uncomment the appropriate trigger (workflow_dispatch, release, or push) and package manager setup",
        "Ensure the deploy step uses workingDirectory: .appwarden/generated-middleware and environment: production",
        "Deploy and verify Worker routes and /_appwarden/heartbeat",
      ]
    subsystems:
      - name: "Standalone Cloudflare worker entrypoint"
        package: "@appwarden/middleware/cloudflare"
        config_surface: "createAppwardenMiddleware((cloudflare) => ({ ... })) with env.APPWARDEN_API_TOKEN and optional CSP_MODE/CSP_DIRECTIVES"
      - name: "deploy-appwarden.yml GitHub Actions workflow"
        package: "appwarden/build-cloudflare-action"
        config_surface: "workflow_dispatch (default) or release/push triggers; env CLOUDFLARE_ACCOUNT_ID (vars), APPWARDEN_API_TOKEN and CLOUDFLARE_API_TOKEN (secrets); build job with appwarden/build-cloudflare-action@v3 (debug, cloudflare-account-id, appwarden-api-token); deploy job with cloudflare/wrangler-action@v4.0.0 (workingDirectory: .appwarden/generated-middleware, environment: production, secrets: APPWARDEN_API_TOKEN)"
    failure_modes:
      - mistake: "Forgetting the build step before deploying"
        mechanism: "The template builds the Appwarden middleware with appwarden/build-cloudflare-action@v3, which produces .appwarden/generated-middleware. Skipping the build leaves nothing to deploy."
        wrong_pattern: |
          # Only deploy step is present, no build step
        correct_pattern: |
          - name: Build @appwarden/middleware
            id: build
            uses: appwarden/build-cloudflare-action@v3
            with:
              debug: true
              cloudflare-account-id: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
              appwarden-api-token: ${{ env.APPWARDEN_API_TOKEN }}
        source: "TEMPLATE--deploy-appwarden.yml build step"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Setting CLOUDFLARE_ACCOUNT_ID as a secret instead of a repository variable"
        mechanism: "The template uses vars.CLOUDFLARE_ACCOUNT_ID, not secrets. Account IDs are not secrets and should be stored as variables."
        wrong_pattern: |
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        correct_pattern: |
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        source: "TEMPLATE--deploy-appwarden.yml env section"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Using the wrong packageManager in the deploy step"
        mechanism: "The wrangler-action deploy step has a packageManager input that must match the project package manager (npm, yarn, or pnpm). A mismatch can cause install failures."
        wrong_pattern: |
          packageManager: npm
          # but the project uses pnpm
        correct_pattern: |
          packageManager: pnpm
        source: "TEMPLATE--deploy-appwarden.yml deploy step"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Deploying from the wrong workingDirectory"
        mechanism: "The build action outputs the generated middleware to .appwarden/generated-middleware; the wrangler-action deploy step must use that exact directory."
        wrong_pattern: |
          # workingDirectory omitted or set to repo root
        correct_pattern: |
          with:
            workingDirectory: .appwarden/generated-middleware
        source: "TEMPLATE--deploy-appwarden.yml deploy step"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID"
        mechanism: "The workflow needs a Cloudflare API token with Worker permissions and the account ID to deploy the generated middleware Worker."
        wrong_pattern: |
          # Only APPWARDEN_API_TOKEN is set as a GitHub secret
        correct_pattern: |
          # Set CLOUDFLARE_ACCOUNT_ID as a variable, CLOUDFLARE_API_TOKEN (with Workers permissions) and APPWARDEN_API_TOKEN as secrets
        source: "TEMPLATE--deploy-appwarden.yml env section and cloudflare-middleware-integration.mdx"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Passing APPWARDEN_API_TOKEN to the build step but not uploading it to the Worker via wrangler-action"
        mechanism: "The token must be available to the build action and also uploaded as a Worker secret by the wrangler-action deploy step."
        wrong_pattern: |
          # Build step has the token, but deploy step does not list secrets
        correct_pattern: |
          - uses: cloudflare/wrangler-action@v4.0.0
            env:
              APPWARDEN_API_TOKEN: ${{ env.APPWARDEN_API_TOKEN }}
            with:
              secrets: |
                APPWARDEN_API_TOKEN
        source: "TEMPLATE--deploy-appwarden.yml deploy step"
        priority: "HIGH"
        status: "active"
      - mistake: "Expecting CSP changes to apply without redeploying the workflow"
        mechanism: "The universal middleware reads CSP from the domain configuration file at deploy time; after merging a domain config change, the deploy-appwarden workflow must run again."
        wrong_pattern: |
          // Merge domain config PR and expect CSP changes immediately
        correct_pattern: |
          // Merge PR, then trigger deploy-appwarden.yml (or push/release based on triggers)
        source: "TEMPLATE--deploy-appwarden.yml triggers and cloudflare-middleware-integration.mdx"
        priority: "MEDIUM"
        status: "active"
  - name: "Wire Appwarden into Vercel Edge Middleware"
    slug: "wire-appwarden-into-vercel-edge-middleware"
    domain: "middleware-integration"
    description: "Integrate Appwarden with Vercel Edge Middleware, including selecting and configuring a cache provider, matcher configuration, and runtime choice."
    type: "framework"
    covers:
      [
        "Vercel middleware file wiring (root or src/)",
        "runtime choice (edge default, nodejs available)",
        "matcher configuration",
        "cache provider selection and env vars",
        "edge-config and Upstash Redis integrations",
        "headers-only CSP without nonce support",
      ]
    tasks:
      [
        "Create or update middleware.ts in the project root or src/ directory",
        "Choose edge or nodejs runtime and configure the matcher",
        "Set APPWARDEN_LOCK_PAGE_SLUG and APPWARDEN_API_TOKEN",
        "Choose Upstash KV or Vercel Edge Config and set the corresponding env var (KV_URL or EDGE_CONFIG)",
        "If using Edge Config, set VERCEL_API_TOKEN with a token that can manage Edge Config",
        "Review usage-based pricing for the chosen cache provider",
        "Deploy and verify with /_appwarden/heartbeat and /quarantine test",
      ]
    subsystems:
      - name: "Vercel edge-config cache provider"
        config_surface: "cacheUrl from EDGE_CONFIG env var (https://edge-config.vercel.com/ecfg_*) — automatically populated when an Edge Config is connected to the project; reads are served via Vercel CDN. Requires vercelApiToken from VERCEL_API_TOKEN for writes/management. Set up via Vercel Edge Config quickstart."
      - name: "Upstash Redis cache provider"
        config_surface: "cacheUrl from KV_URL env var (rediss://:password@hostname.upstash.io:6379), no vercelApiToken needed; set up via Vercel Marketplace Upstash KV integration"
    failure_modes:
      - mistake: "Using Edge Config without providing vercelApiToken"
        mechanism: "Appwarden needs a Vercel API token to manage the Edge Config store that holds the quarantine status; the schema rejects Edge Config URLs without vercelApiToken."
        wrong_pattern: |
          createAppwardenMiddleware({
            cacheUrl: process.env.EDGE_CONFIG!,
            appwardenApiToken: process.env.APPWARDEN_API_TOKEN!,
          })
        correct_pattern: |
          createAppwardenMiddleware({
            cacheUrl: process.env.APPWARDEN_CACHE_URL!,
            vercelApiToken: process.env.APPWARDEN_VERCEL_API_TOKEN!,
            appwardenApiToken: process.env.APPWARDEN_API_TOKEN!,
          })
        source: "src/schemas/vercel.ts AppwardenConfigSchema, README Configuration > cacheUrl/vercelApiToken, and vercel-middleware-integration.mdx"
        priority: "CRITICAL"
        status: "active"
      - mistake: "Using an unrecognized cacheUrl format or wrong env var name"
        mechanism: "The schema only recognizes Vercel Edge Config or Upstash KV URLs; Upstash integration sets KV_URL (or UPSTASH_KV_URL if KV_URL is already taken), and Edge Config sets EDGE_CONFIG. Passing the wrong variable name causes runtime errors."
        wrong_pattern: |
          cacheUrl: process.env.REDIS_URL
        correct_pattern: |
          cacheUrl: process.env.KV_URL // Upstash KV
          // or cacheUrl: process.env.EDGE_CONFIG // Vercel Edge Config
        source: "src/schemas/vercel.ts AppwardenConfigSchema and vercel-middleware-integration.mdx Configure a cache provider"
        priority: "HIGH"
        status: "active"
      - mistake: "Using Upstash KV but not assigning KV_URL correctly"
        mechanism: "The Vercel Upstash KV integration generates KV_URL by default; if KV_URL is already set in the project, it may generate UPSTASH_KV_URL instead. The middleware must receive the correct URL."
        wrong_pattern: |
          cacheUrl: process.env.KV_URL
          // but UPSTASH_KV_URL is the actual populated variable
        correct_pattern: |
          // Verify which env var the Upstash integration populated and pass that to cacheUrl
          cacheUrl: process.env.KV_URL ?? process.env.UPSTASH_KV_URL
        source: "vercel-middleware-integration.mdx Configure a cache provider > Upstash KV"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Using Edge Config without a Vercel API token that can manage Edge Config"
        mechanism: "Edge Config requires VERCEL_API_TOKEN to write quarantine status; the token must have permission to manage Edge Config for the project."
        wrong_pattern: |
          // Edge Config token only has read permission or is missing
          cacheUrl: process.env.EDGE_CONFIG,
          vercelApiToken: process.env.VERCEL_API_TOKEN,
        correct_pattern: |
          // Create a Vercel API token with the necessary Edge Config scope per the Vercel API token guide
          cacheUrl: process.env.EDGE_CONFIG,
          vercelApiToken: process.env.VERCEL_API_TOKEN,
        source: "vercel-middleware-integration.mdx Configure a cache provider > Vercel Edge Config"
        priority: "HIGH"
        status: "active"
      - mistake: "Configuring Appwarden to read quarantine status through api.vercel.com instead of edge-config.vercel.com"
        mechanism: "The Vercel REST API (api.vercel.com) is for managing Edge Configs and is rate-limited to 20 reads/minute with no CDN optimization. Appwarden reads should go through the Edge Config endpoint (edge-config.vercel.com) via the EDGE_CONFIG connection string, which is automatically populated when an Edge Config is connected to the project."
        wrong_pattern: |
          // Manually constructing a URL against api.vercel.com for runtime reads
          cacheUrl: "https://api.vercel.com/v1/edge-config/ecfg_..."
        correct_pattern: |
          // Use the EDGE_CONFIG env var provided by Vercel (https://edge-config.vercel.com/ecfg_...)
          cacheUrl: process.env.EDGE_CONFIG
        source: "https://vercel.com/docs/edge-config/using-edge-config Understanding Edge Config endpoints"
        priority: "HIGH"
        status: "active"
      - mistake: "Losing the Edge Config read access token and not creating a new one"
        mechanism: "Vercel shows the full Edge Config read token only once after creation. If it is lost, the token must be deleted and recreated, and the EDGE_CONFIG value must be updated in the project."
        wrong_pattern: |
          // Assuming the token can be retrieved later from the dashboard
        correct_pattern: |
          // Copy the token immediately after creation; if lost, delete and recreate the read access token, then update EDGE_CONFIG
        source: "https://vercel.com/docs/edge-config/using-edge-config Creating a read access token"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Including {{nonce}} in CSP directives for Vercel"
        mechanism: "Vercel Edge Middleware cannot rewrite HTML to inject nonces, so the schema rejects {{nonce}} placeholders on Vercel."
        wrong_pattern: |
          contentSecurityPolicy: {
            mode: "enforced",
            directives: { "script-src": ["'self'", "{{nonce}}"] },
          }
        correct_pattern: |
          contentSecurityPolicy: {
            mode: "enforced",
            directives: { "default-src": ["'self'"] },
          }
        source: "src/schemas/vercel.ts VercelCSPSchema, README Feature Compatibility, and vercel-middleware-integration.mdx"
        priority: "HIGH"
        status: "active"
      - mistake: "Matching static assets and API routes in the middleware matcher"
        mechanism: "Running Appwarden on static assets and API routes increases edge usage and can cause unnecessary overhead; the matcher should exclude api, _next/static, _next/image, favicon.ico, and image/font/static files."
        wrong_pattern: |
          export const config = { matcher: ["/(.*)"] }
        correct_pattern: |
          export const config = {
            matcher: ["/((?!api|_next/static|_next/image|favicon.ico|.*\\.(?:svg|png|jpg|jpeg|gif|webp)$).*)"],
          }
        source: "vercel-middleware-integration.mdx Installation > Add Appwarden to your Vercel project"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Relying on the module-level memory cache for multi-tenant Vercel deployments"
        mechanism: "The Vercel runner uses a single module-level MemoryCache with a fixed APPWARDEN_CACHE_KEY; if multiple logical hosts share the same runtime process, lock state can bleed across hosts."
        wrong_pattern: |
          // Assuming cache is isolated per project automatically
        correct_pattern: |
          // Keep cacheUrl/appwardenApiToken scoped per project; be aware that the runtime cache is shared at the process level
        source: "examples/bug-reports-vercel.md finding 2 and src/runners/appwarden-on-vercel.ts"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Enabling Vercel Deployment Protection without a bypass secret for automated verification"
        mechanism: "When Deployment Protection is enabled, automated requests to preview deployments (e.g., /_appwarden/test verification or external callbacks) can be blocked. Vercel provides a Protection Bypass for Automation secret that must be passed as the x-vercel-protection-bypass header."
        wrong_pattern: |
          // Enable Deployment Protection and expect automated verification to work on preview URLs
        correct_pattern: |
          // Vercel project settings > Deployment Protection > Protection Bypass for Automation > Add Secret
          // Store as VERCEL_AUTOMATION_BYPASS_SECRET and pass x-vercel-protection-bypass header where required
        source: "https://upstash.com/docs/workflow/troubleshooting/vercel Preview Deployment Protection"
        priority: "MEDIUM"
        status: "active"
