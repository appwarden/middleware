            appwardenApiToken: env.APPWARDEN_API_TOKEN,
            appwardenApiHostname: "https://api.appwarden.io",
          })
        correct_pattern: |
          getAppwardenConfiguration(appwardenConfig, {
            appwardenApiToken: env.APPWARDEN_API_TOKEN,
          })
        source: "src/schemas/helpers.ts AppwardenApiHostnameSchema"
        priority: "HIGH"
        status: "active"
      - mistake: "Leaving debug disabled during initial setup"
        mechanism: "Without debug: true, config validation failures and lock-status checks are silent, making first-time troubleshooting difficult."
        wrong_pattern: |
          createAppwardenMiddleware({
            appwardenApiToken: env.APPWARDEN_API_TOKEN,
            lockPageSlug: "/maintenance",
          })
        correct_pattern: |
          createAppwardenMiddleware({
            appwardenApiToken: env.APPWARDEN_API_TOKEN,
            lockPageSlug: "/maintenance",
            debug: true,
